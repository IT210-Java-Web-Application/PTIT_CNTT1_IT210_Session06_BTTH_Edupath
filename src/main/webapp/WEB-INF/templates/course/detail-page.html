<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout/main-layout">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<div layout:fragment="content" class="container">

    <div class="detail-box">
        <h2 th:text="${course.name}"></h2>

        <p><b>Description:</b> <span th:text="${course.description}"></span></p>
        <p><b>Instructor:</b> <span th:text="${course.instructor}"></span></p>
        <p><b>Duration:</b> <span th:text="${course.duration} + ' months'"></span></p>

        <span class="badge-full" th:if="${course.full}">
            HẾT CHỖ
        </span>
    </div>

</div>
</html>
